name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend (.NET build + testes)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build SabemiWebhooks.slnx --nologo

      - name: Testes de integração
        run: dotnet test SabemiWebhooks.slnx --nologo --no-build

  frontend:
    name: Frontend (React build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sabemi-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm ci

      - name: Build
        run: npm run build
